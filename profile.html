<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القائد - بطاقة شخصية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 50%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 60px 50px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 100%;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-image {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: 0 auto 30px;
            border: 5px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: block;
            object-fit: cover;
        }

        .profile-name {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #1a1a2e;
            text-shadow: none;
            letter-spacing: 1px;
        }

        .profile-title {
            font-size: 18px;
            color: #4a5568;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        .social-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .neon-button {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .neon-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .neon-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .neon-button span {
            position: relative;
            z-index: 1;
        }

        .linkedin {
            background: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }

        .linkedin:hover {
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.8), 0 0 60px rgba(0, 255, 136, 0.4);
            transform: translateY(-5px);
        }

        .github {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .github:hover {
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.8), 0 0 60px rgba(0, 212, 255, 0.4);
            transform: translateY(-5px);
        }

        @media (max-width: 500px) {
            .profile-card {
                padding: 40px 30px;
            }

            .profile-name {
                font-size: 28px;
            }

            .profile-title {
                font-size: 16px;
            }

            .neon-button {
                padding: 12px 25px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <img src="my_photo.png" alt="القائد" class="profile-image">
        <h1 class="profile-name">القائد</h1>
        <p class="profile-title">مهندس نظم أشباح</p>
        <div class="social-buttons">
            <a href="https://linkedin.com" class="neon-button linkedin" target="_blank">
                <span>LinkedIn</span>
            </a>
            <a href="https://github.com" class="neon-button github" target="_blank">
                <span>GitHub</span>
            </a>
        </div>
    </div>
</body>
</html>
