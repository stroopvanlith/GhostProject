<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القائد - بطاقة شخصية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 25px;
            border: 4px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: bold;
            color: #fff;
        }

        .profile-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-title {
            font-size: 18px;
            color: #b0b0b0;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .social-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .neon-button {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
        }

        .neon-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease;
        }

        .neon-button:hover::before {
            left: 100%;
        }

        .linkedin {
            background: linear-gradient(135deg, #0077b5, #00a0dc);
            color: white;
            box-shadow: 0 0 15px rgba(0, 119, 181, 0.5);
        }

        .linkedin:hover {
            box-shadow: 0 0 25px rgba(0, 119, 181, 0.8);
            transform: translateY(-3px);
        }

        .github {
            background: linear-gradient(135deg, #333, #666);
            color: white;
            box-shadow: 0 0 15px rgba(102, 102, 102, 0.5);
        }

        .github:hover {
            box-shadow: 0 0 25px rgba(102, 102, 102, 0.8);
            transform: translateY(-3px);
        }

        .twitter {
            background: linear-gradient(135deg, #1da1f2, #0d8bd9);
            color: white;
            box-shadow: 0 0 15px rgba(29, 161, 242, 0.5);
        }

        .twitter:hover {
            box-shadow: 0 0 25px rgba(29, 161, 242, 0.8);
            transform: translateY(-3px);
        }

        .email {
            background: linear-gradient(135deg, #ea4335, #d33426);
            color: white;
            box-shadow: 0 0 15px rgba(234, 67, 53, 0.5);
        }

        .email:hover {
            box-shadow: 0 0 25px rgba(234, 67, 53, 0.8);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="profile-image">
            ق
        </div>
        <h1 class="profile-name">القائد</h1>
        <p class="profile-title">مهندس نظم أشباح</p>
        <div class="social-buttons">
            <a href="https://linkedin.com" class="neon-button linkedin" target="_blank">LinkedIn</a>
            <a href="https://github.com" class="neon-button github" target="_blank">GitHub</a>
            <a href="https://twitter.com" class="neon-button twitter" target="_blank">Twitter</a>
            <a href="mailto:contact@example.com" class="neon-button email">Email</a>
        </div>
    </div>
</body>
</html>
