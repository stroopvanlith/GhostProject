<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>القائد - بطاقة شخصية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-container {
            background: #ffffff;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .profile-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: block;
            object-fit: cover;
            border: 4px solid #e9ecef;
        }

        .profile-name {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1d29;
            letter-spacing: 0.5px;
        }

        .profile-title {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 45px;
            font-weight: 500;
        }

        .social-buttons {
            display: flex;
            gap: 18px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .neon-button {
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .neon-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }

        .neon-button:hover::before {
            width: 350px;
            height: 350px;
        }

        .neon-button span {
            position: relative;
            z-index: 1;
        }

        .linkedin {
            background: linear-gradient(135deg, #0077b5 0%, #005582 100%);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 119, 181, 0.3);
        }

        .linkedin:hover {
            box-shadow: 0 0 30px rgba(0, 119, 181, 0.6), 0 0 50px rgba(0, 119, 181, 0.4);
            transform: translateY(-3px);
        }

        .github {
            background: linear-gradient(135deg, #24292e 0%, #0d1117 100%);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(36, 41, 46, 0.3);
        }

        .github:hover {
            box-shadow: 0 0 30px rgba(36, 41, 46, 0.6), 0 0 50px rgba(36, 41, 46, 0.4);
            transform: translateY(-3px);
        }

        @media (max-width: 500px) {
            .profile-container {
                padding: 40px 30px;
            }

            .profile-image {
                width: 150px;
                height: 150px;
            }

            .profile-name {
                font-size: 30px;
            }

            .profile-title {
                font-size: 18px;
            }

            .neon-button {
                padding: 14px 30px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <img src="my_photo.png" alt="القائد" class="profile-image">
        <h1 class="profile-name">القائد</h1>
        <p class="profile-title">مهندس نظم أشباح</p>
        <div class="social-buttons">
            <a href="https://linkedin.com" class="neon-button linkedin" target="_blank">
                <span>LinkedIn</span>
            </a>
            <a href="https://github.com" class="neon-button github" target="_blank">
                <span>GitHub</span>
            </a>
        </div>
    </div>
</body>
</html>
