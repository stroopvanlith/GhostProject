<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Vault - Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #00ff41;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #00ff41;
            border-radius: 15px;
            padding: 50px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff41;
            letter-spacing: 3px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 0.9em;
        }

        .password-display {
            background: #0a0a0a;
            border: 2px solid #00ff41;
            border-radius: 10px;
            padding: 25px;
            margin: 30px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            font-size: 1.5em;
            letter-spacing: 2px;
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.1);
            transition: all 0.3s ease;
        }

        .password-display.active {
            box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.3), 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .password-text {
            color: #00ff41;
            text-shadow: 0 0 5px #00ff41;
        }

        .placeholder {
            color: #444;
            font-style: italic;
        }

        button {
            background: linear-gradient(135deg, #00ff41 0%, #00cc33 100%);
            color: #0a0a0a;
            border: none;
            padding: 18px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
            font-family: 'Courier New', monospace;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.6);
            background: linear-gradient(135deg, #00ff41 0%, #00ff41 100%);
        }

        button:active {
            transform: translateY(-1px);
        }

        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .copy-btn {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            color: #00ff41;
            border: 2px solid #00ff41;
        }

        .copy-btn:hover {
            background: linear-gradient(135deg, #2a2a2a 0%, #3a3a3a 100%);
        }

        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            background: #00ff41;
            color: #0a0a0a;
            padding: 20px 30px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.6);
            opacity: 0;
            transform: translateX(400px);
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            button {
                padding: 15px 30px;
                font-size: 1em;
            }

            .password-display {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ PASSWORD VAULT ⚡</h1>
        <p class="subtitle">Secure Password Generator</p>
        
        <div class="password-display" id="passwordDisplay">
            <span class="placeholder">Click Generate to create a password</span>
        </div>

        <div class="buttons-container">
            <button onclick="generatePassword()">🔐 Generate Password</button>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()" disabled>📋 Copy to Clipboard</button>
        </div>
    </div>

    <div class="notification" id="notification">
        ✓ Password copied successfully!
    </div>

    <script>
        let currentPassword = '';

        function generatePassword() {
            const length = 16;
            const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lowercase = 'abcdefghijklmnopqrstuvwxyz';
            const numbers = '0123456789';
            const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            const allChars = uppercase + lowercase + numbers + symbols;
            
            let password = '';
            
            // Ensure at least one character from each category
            password += uppercase[Math.floor(Math.random() * uppercase.length)];
            password += lowercase[Math.floor(Math.random() * lowercase.length)];
            password += numbers[Math.floor(Math.random() * numbers.length)];
            password += symbols[Math.floor(Math.random() * symbols.length)];
            
            // Fill the rest randomly
            for (let i = password.length; i < length; i++) {
                password += allChars[Math.floor(Math.random() * allChars.length)];
            }
            
            // Shuffle the password
            password = password.split('').sort(() => Math.random() - 0.5).join('');
            
            currentPassword = password;
            
            const displayElement = document.getElementById('passwordDisplay');
            displayElement.innerHTML = `<span class="password-text">${password}</span>`;
            displayElement.classList.add('active');
            
            document.getElementById('copyBtn').disabled = false;
        }

        function copyToClipboard() {
            if (!currentPassword) return;
            
            navigator.clipboard.writeText(currentPassword).then(() => {
                showNotification();
            }).catch(err => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = currentPassword;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showNotification();
            });
        }

        function showNotification() {
            const notification = document.getElementById('notification');
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
